<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agama</title>
    <!--
      Apply the persisted theme before first paint to avoid a flash of the wrong
      theme. Runs before React boots, so it reads localStorage directly; the
      keys and JSON encoding must match src/context/appearance.tsx.
    -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var colorScheme = JSON.parse(localStorage.getItem("agm-color-scheme") || '"system"');
          var contrast = JSON.parse(localStorage.getItem("agm-contrast") || '"system"');
          var dark =
            colorScheme === "dark" ||
            (colorScheme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var highContrast =
            contrast === "high" ||
            (contrast === "system" && window.matchMedia("(prefers-contrast: more)").matches);
          root.classList.toggle("pf-v6-theme-dark", dark);
          root.classList.toggle("pf-v6-theme-high-contrast", highContrast);
          root.style.colorScheme = colorScheme === "system" ? "light dark" : colorScheme;
        } catch (e) {
          /* ignore: fall back to the default light theme */
        }
      })();
    </script>
    <!--
      Apply the last known product's appearance stylesheet before first paint,
      to avoid a flash from the stock Agama colors to the product's own
      palette. Runs before React boots, so it reads localStorage directly;
      kept in sync with src/hooks/use-product-appearance.ts (same key, same
      link element id). A missing/404 stylesheet is harmless (see
      doc/product_theming.md).
    -->
    <script>
      (function () {
        try {
          var productId = localStorage.getItem("agm-product-id");
          if (!productId) return;

          var link = document.createElement("link");
          link.id = "agm-product-appearance";
          link.rel = "stylesheet";
          link.href = "assets/appearance/" + productId + ".css";
          document.head.appendChild(link);
        } catch (e) {
          /* ignore: fall back to the default Agama appearance */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
