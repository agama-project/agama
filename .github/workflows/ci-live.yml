name: CI - ISO definition

permissions:
  contents: read

on:
  push:
    paths:
      # NOTE: GitHub Actions do not allow using YAML references, the same path
      # list is used below for the pull request event. Keep both lists in sync!!

      # this file as well
      - .github/workflows/ci-live.yml
      # any change in the live subfolder
      - live/**

  pull_request:
    paths:
      # NOTE: GitHub Actions do not allow using YAML references, the same path
      # list is used above for the push event. Keep both lists in sync!!

      # this file as well
      - .github/workflows/ci-live.yml
      # any change in the live subfolder
      - live/**

  # allow running manually
  workflow_dispatch:

jobs:
  live_tests:
    runs-on: ubuntu-latest
    env:
      COVERAGE: 1

    defaults:
      run:
        working-directory: ./live

    container:
      # use the openSUSE Leap 16.0 as the base image
      image: registry.opensuse.org/opensuse/leap:16.0

    steps:

    - name: Git Checkout
      uses: actions/checkout@v6

    - name: Configure and refresh repositories
      # disable unused repositories to have faster refresh
      run: zypper modifyrepo -d openSUSE:repo-openh264 && zypper ref

    - name: Install development files
      run: zypper --non-interactive install --no-recommends
        agama-cli
        findutils
        make
        "rubygem(cheetah)"
        "rubygem(rspec)"
        ShellCheck

    - name: Run shellcheck
      run: make shellcheck

    - name: Run the tests
      run: make check
